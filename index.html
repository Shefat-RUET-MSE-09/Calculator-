<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Casio fx-Style | SciCalc Pro</title>
  <!-- Math.js for parsing, matrices, complex, stats -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
  <!-- Chart.js for graphing -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #05070c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
      padding: 12px;
    }

    /* Casio-style body */
    .casio {
      max-width: 440px;
      width: 100%;
      background: #0f131e;
      border-radius: 2rem;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 1.2rem;
      border: 1px solid #2a3448;
      transition: all 0.2s;
    }

    /* Display */
    .display-panel {
      background: #03060c;
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
      box-shadow: inset 0 3px 8px #00000040, 0 1px 0 #2a3a4e;
      font-family: 'JetBrains Mono', monospace;
    }
    .mode-indicator {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #4cd8ff;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .expression {
      font-size: 0.95rem;
      color: #8ea3c2;
      min-height: 1.8rem;
      word-break: break-word;
      text-align: right;
    }
    .result {
      font-size: 2.1rem;
      font-weight: 700;
      color: #e2f0ff;
      text-align: right;
      word-break: break-word;
      letter-spacing: 1px;
    }
    .shift-alpha-status {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      font-size: 0.65rem;
      color: #ffb347;
    }

    /* Button Grid */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px 6px;
      margin-top: 8px;
    }
    button {
      background: #161c28;
      border: none;
      border-radius: 1.2rem;
      padding: 14px 0;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Poppins', monospace;
      color: #eef4ff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.4);
      transition: 0.05s linear;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:active {
      transform: scale(0.94);
      filter: brightness(1.2);
    }
    .func-key {
      background: #1a2432;
      color: #7bc5ff;
    }
    .num-key {
      background: #0f131e;
      color: #ffffff;
      font-weight: 700;
    }
    .eq-key {
      background: #1e5f6b;
      color: white;
      box-shadow: 0 0 6px #2d9eb0;
    }
    .mode-key {
      background: #2c253b;
      color: #e2b0ff;
    }
    .shift-active {
      background: #d97a2b;
      color: black;
      box-shadow: 0 0 8px orange;
    }
    .alpha-active {
      background: #5f9e6e;
      color: white;
    }

    /* Full-screen MODE menu */
    .modal-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(6, 10, 20, 0.98);
      backdrop-filter: blur(14px);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      transition: 0.2s;
    }
    .modal-content {
      background: #121725;
      width: 90%;
      max-width: 360px;
      border-radius: 2.5rem;
      padding: 1.8rem 1.2rem;
      border: 1px solid #3e4a66;
      box-shadow: 0 20px 30px black;
    }
    .modal-content h3 {
      color: #5dd9ff;
      margin-bottom: 1.2rem;
      text-align: center;
    }
    .mode-option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e2538;
      margin: 0.7rem 0;
      padding: 0.8rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: 0.1s;
      font-weight: bold;
    }
    .mode-option:active {
      background: #2f3b5c;
      transform: scale(0.98);
    }
    .close-menu {
      background: #9b5e2c;
      margin-top: 1.2rem;
      text-align: center;
      padding: 0.7rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
    }

    /* Graph canvas (optional advanced) */
    .graph-container {
      margin-top: 12px;
      background: #0b0f18;
      border-radius: 1.2rem;
      padding: 8px;
      display: none;
    }
    .graph-container.show {
      display: block;
    }
    canvas {
      max-height: 180px;
      width: 100%;
      border-radius: 1rem;
    }

    /* Memory / history tiny */
    .extra-bar {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: #6d85aa;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="casio" id="app">
  <div class="display-panel">
    <div class="mode-indicator">
      <span id="modeName">🔢 COMP</span>
      <span id="shiftAlphaState">⚡</span>
    </div>
    <div class="expression" id="expressionPreview">0</div>
    <div class="result" id="resultDisplay">0</div>
    <div class="shift-alpha-status" id="statusMsg"></div>
  </div>

  <div class="button-grid" id="buttonsContainer"></div>
  
  <!-- Graph container (optional) -->
  <div class="graph-container" id="graphContainer">
    <canvas id="funcChart"></canvas>
  </div>
  <div class="extra-bar">
    <span id="memInfo">M: ---</span>
    <span id="varInfo">ALPHA: A,B,C,X,Y</span>
  </div>
</div>

<script>
  // ---------- GLOBAL STATE ----------
  let currentMode = "COMP";    // COMP, STAT, MATRIX, VECTOR, COMPLEX, BASE-N, EQUATION, CALCULUS
  let shiftPressed = false;
  let alphaPressed = false;
  let currentExpression = "0";
  let lastResult = "0";
  let memoryStore = 0;
  let variables = { A: 0, B: 0, C: 0, X: 0, Y: 0 };
  let chartInstance = null;

  // Helper: update display
  function updateDisplay() {
    document.getElementById("expressionPreview").innerText = currentExpression || "0";
    document.getElementById("resultDisplay").innerText = lastResult;
    let shiftAlphaText = "";
    if (shiftPressed) shiftAlphaText += "🔷 SHIFT ";
    if (alphaPressed) shiftAlphaText += "🔤 ALPHA";
    document.getElementById("shiftAlphaState").innerText = shiftAlphaText || "⚡";
    document.getElementById("memInfo").innerText = `M: ${memoryStore !== 0 ? memoryStore : "---"}`;
    document.getElementById("modeName").innerHTML = getModeIcon();
  }

  function getModeIcon() {
    switch(currentMode) {
      case "COMP": return "🔢 COMP"; case "STAT": return "📊 STAT"; case "MATRIX": return "🔲 MATRIX";
      case "VECTOR": return "➡️ VECTOR"; case "COMPLEX": return "🌀 COMPLEX"; case "BASE-N": return "💠 BASE-N";
      case "EQUATION": return "📐 EQUATION"; case "CALCULUS": return "📈 CALCULUS";
      default: return "🔢 COMP";
    }
  }

  // Evaluate expression with current mode context
  function evaluateExpression(expr) {
    if (!expr.trim()) return "0";
    try {
      let prepared = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '^');
      // handle factorial n! -> math.factorial
      prepared = prepared.replace(/(\d+)!/g, (_,n) => `factorial(${n})`);
      prepared = prepared.replace(/(\d+)!/g, (_,n) => `factorial(${n})`);
      // custom functions mapping
      let scope = { ...variables, e: Math.E, pi: Math.PI, π: Math.PI, factorial: (n) => n<0?NaN:(n<=1?1:n*arguments.callee(n-1)) };
      // mode-specific parsing
      if (currentMode === "COMPLEX" && expr.includes("+") && expr.includes("i")) {
        let res = math.complex(expr.replace(/i/g, 'i'));
        return `${res.re} + ${res.im}i`;
      }
      if (currentMode === "MATRIX" && expr.startsWith("[") && expr.endsWith("]")) {
        let mat = math.evaluate(expr);
        return math.format(mat, {precision: 6});
      }
      if (currentMode === "VECTOR" && expr.includes(",")) {
        let vec = math.evaluate(expr);
        return `(${vec.join(',')})`;
      }
      let result = math.evaluate(prepared, scope);
      if (typeof result === 'number' && (isNaN(result) || !isFinite(result))) throw new Error("Invalid");
      return math.format(result, {precision: 10});
    } catch(e) {
      return "Error";
    }
  }

  // Main calculate from currentExpression
  function calculate() {
    if (currentExpression === "") currentExpression = "0";
    let res = evaluateExpression(currentExpression);
    lastResult = res;
    updateDisplay();
    return res;
  }

  // append token
  function appendToExpression(val) {
    if (currentExpression === "0" && /[0-9(]/.test(val)) currentExpression = val;
    else currentExpression += val;
    updateDisplay();
  }

  // handle unary operations respecting shift
  function handleUnaryOp(baseOp, shiftedOp) {
    let op = (shiftPressed && shiftedOp) ? shiftedOp : baseOp;
    let exprVal = currentExpression;
    let num = parseFloat(exprVal);
    if (isNaN(num) && exprVal !== "π" && exprVal !== "e") num = 0;
    let result;
    switch(op) {
      case 'sin': result = Math.sin(num); break;
      case 'sin⁻¹': result = Math.asin(num); break;
      case 'cos': result = Math.cos(num); break;
      case 'cos⁻¹': result = Math.acos(num); break;
      case 'tan': result = Math.tan(num); break;
      case 'tan⁻¹': result = Math.atan(num); break;
      case 'log': result = Math.log10(num); break;
      case '10^x': result = Math.pow(10, num); break;
      case 'ln': result = Math.log(num); break;
      case 'e^x': result = Math.exp(num); break;
      case '√': result = Math.sqrt(num); break;
      case 'x²': result = num * num; break;
      case 'x³': result = Math.pow(num,3); break;
      case '1/x': result = 1/num; break;
      case '|x|': result = Math.abs(num); break;
      case 'x!': result = (num >=0 && Number.isInteger(num)) ? factorial(num) : NaN; break;
      default: result = "?";
    }
    if (typeof result === 'number' && !isNaN(result)) lastResult = result.toString();
    else lastResult = "Error";
    currentExpression = lastResult;
    updateDisplay();
    shiftPressed = false;
    updateDisplay();
  }

  function factorial(n) { if(n<0) return NaN; let f=1; for(let i=2;i<=n;i++) f*=i; return f; }

  // SHIFT & ALPHA toggles
  function toggleShift() { shiftPressed = !shiftPressed; if(shiftPressed) alphaPressed=false; updateDisplay(); }
  function toggleAlpha() { alphaPressed = !alphaPressed; if(alphaPressed) shiftPressed=false; updateDisplay(); }

  // Store / recall / alpha assignment
  function memoryStore() { memoryStore = parseFloat(lastResult); updateDisplay(); }
  function memoryRecall() { currentExpression = memoryStore.toString(); updateDisplay(); }
  function alphaStore(key) { let val = parseFloat(lastResult); if(!isNaN(val)) variables[key] = val; updateDisplay(); }
  function alphaRecall(key) { if(variables[key] !== undefined) { currentExpression = variables[key].toString(); updateDisplay(); } }

  // MODE Menu System
  function openModeMenu() {
    let menuDiv = document.createElement("div");
    menuDiv.className = "modal-menu";
    menuDiv.innerHTML = `
      <div class="modal-content">
        <h3>⚙️ MODE SELECTOR</h3>
        <div class="mode-option" data-mode="COMP">🔢 COMP (General)</div>
        <div class="mode-option" data-mode="STAT">📊 STAT (Mean, Std, Regression)</div>
        <div class="mode-option" data-mode="MATRIX">🔲 MATRIX (Det, Inverse)</div>
        <div class="mode-option" data-mode="VECTOR">➡️ VECTOR (Dot/Cross)</div>
        <div class="mode-option" data-mode="COMPLEX">🌀 COMPLEX (a+bi)</div>
        <div class="mode-option" data-mode="BASE-N">💠 BASE-N (Bin/Oct/Hex)</div>
        <div class="mode-option" data-mode="EQUATION">📐 EQUATION (Solver)</div>
        <div class="mode-option" data-mode="CALCULUS">📈 CALCULUS (Derivative/Integral)</div>
        <div class="close-menu">✖ CLOSE</div>
      </div>
    `;
    document.body.appendChild(menuDiv);
    menuDiv.querySelectorAll(".mode-option").forEach(opt => {
      opt.addEventListener("click", (e) => {
        let newMode = opt.getAttribute("data-mode");
        currentMode = newMode;
        updateDisplay();
        menuDiv.remove();
        if (newMode === "CALCULUS") showGraphOption();
        else hideGraph();
      });
    });
    menuDiv.querySelector(".close-menu").addEventListener("click", () => menuDiv.remove());
  }

  function showGraphOption() {
    let graphDiv = document.getElementById("graphContainer");
    graphDiv.classList.add("show");
    if (chartInstance) chartInstance.destroy();
    let ctx = document.getElementById("funcChart").getContext("2d");
    let xVals = [], yVals = [];
    for(let i=-4; i<=4; i+=0.1){
      let x = i;
      let y;
      try{
        let expr = currentExpression.replace(/×/g,'*').replace(/÷/g,'/').replace(/\^/g,'^');
        y = math.evaluate(expr, {x: x, ...variables});
        if(typeof y !== 'number') y = NaN;
      } catch(e){ y = NaN; }
      if(isFinite(y)){ xVals.push(x); yVals.push(y); }
    }
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { datasets: [{ label: `f(x)=${currentExpression}`, data: yVals.map((y,i)=>({x:xVals[i], y})), borderColor: '#3ec1d3', tension: 0.1, pointRadius: 0 }] },
      options: { responsive: true, maintainAspectRatio: true, scales: { x: { type: 'linear', title:{ display:true, text:'x' } }, y: { title:{ display:true, text:'f(x)' } } } }
    });
  }
  function hideGraph() { document.getElementById("graphContainer").classList.remove("show"); if(chartInstance){ chartInstance.destroy(); chartInstance=null; } }

  // EQUATION solver helpers
  function solveLinear() { let expr = currentExpression; try { let eq = expr.split("="); let lhs = eq[0]; let rhs = eq[1] || "0"; let sol = math.solve(lhs+"-("+rhs+")", "x"); lastResult = sol.toString(); currentExpression = lastResult; updateDisplay(); } catch(e){ lastResult = "No solution"; updateDisplay(); } }
  function statCommand(cmd) { let nums = currentExpression.split(",").map(Number).filter(n=>!isNaN(n)); if(nums.length===0) { lastResult="Enter list: 1,2,3"; updateDisplay(); return; } if(cmd==="mean") lastResult = math.mean(nums).toString(); if(cmd==="median") lastResult = math.median(nums).toString(); if(cmd==="std") lastResult = math.std(nums).toString(); currentExpression = lastResult; updateDisplay(); }

  // Matrix operations
  function matrixOp(op) { try { let mat = math.evaluate(currentExpression); if(op==="det") lastResult = math.det(mat).toString(); if(op==="inv") lastResult = math.format(math.inv(mat)); currentExpression = lastResult; updateDisplay(); } catch(e){ lastResult = "Matrix error"; updateDisplay(); } }

  // Build dynamic button layout (Casio style)
  const mainButtons = [
    ["SHIFT","ALPHA","MODE","AC","DEL"],
    ["sin","cos","tan","log","ln"],
    ["(",")","√","x²","x^y"],
    ["7","8","9","÷","DEL2"],
    ["4","5","6","×","Ans"],
    ["1","2","3","−","EXP"],
    ["0",".","=","π","e"],
    ["n!","1/x","|x|","e^x","10^x"]
  ];

  function renderButtons() {
    const container = document.getElementById("buttonsContainer");
    container.innerHTML = "";
    for(let row of mainButtons) {
      for(let label of row) {
        let btn = document.createElement("button");
        btn.innerText = label;
        if(label === "DEL" || label === "AC") btn.classList.add("func-key");
        else if(label === "=") btn.classList.add("eq-key");
        else if(label === "MODE") btn.classList.add("mode-key");
        else if(!isNaN(label) || label === ".") btn.classList.add("num-key");
        else btn.classList.add("func-key");
        
        btn.addEventListener("click", () => {
          // handle AC
          if(label === "AC") { currentExpression = "0"; lastResult = "0"; shiftPressed=false; alphaPressed=false; updateDisplay(); return; }
          if(label === "DEL") { currentExpression = currentExpression.slice(0,-1) || "0"; updateDisplay(); return; }
          if(label === "SHIFT") { toggleShift(); return; }
          if(label === "ALPHA") { toggleAlpha(); return; }
          if(label === "MODE") { openModeMenu(); return; }
          if(label === "Ans") { currentExpression += lastResult.toString(); updateDisplay(); return; }
          if(label === "EXP") { currentExpression += "e"; updateDisplay(); return; }
          if(label === "π") { currentExpression += "π"; updateDisplay(); return; }
          if(label === "e") { currentExpression += "e"; updateDisplay(); return; }
          // operators
          if(["÷","×","−","+","^","(" ,")"].includes(label)) { let sym = label==="÷"?"/":label==="×"?"*":label; appendToExpression(sym); return; }
          if(label === "=") { calculate(); return; }
          // scientific functions with shift
          if(label === "sin") { if(shiftPressed) handleUnaryOp('sin','sin⁻¹'); else handleUnaryOp('sin',null); return; }
          if(label === "cos") { if(shiftPressed) handleUnaryOp('cos','cos⁻¹'); else handleUnaryOp('cos',null); return; }
          if(label === "tan") { if(shiftPressed) handleUnaryOp('tan','tan⁻¹'); else handleUnaryOp('tan',null); return; }
          if(label === "log") { if(shiftPressed) handleUnaryOp('log','10^x'); else handleUnaryOp('log',null); return; }
          if(label === "ln") { if(shiftPressed) handleUnaryOp('ln','e^x'); else handleUnaryOp('ln',null); return; }
          if(label === "√") { if(shiftPressed) handleUnaryOp('√','x³'); else handleUnaryOp('√',null); return; }
          if(label === "x²") { if(shiftPressed) handleUnaryOp('x²','√'); else handleUnaryOp('x²',null); return; }
          if(label === "x^y") { appendToExpression("^"); return; }
          if(label === "n!") { handleUnaryOp('x!',null); return; }
          if(label === "1/x") { handleUnaryOp('1/x',null); return; }
          if(label === "|x|") { handleUnaryOp('|x|',null); return; }
          if(label === "e^x") { handleUnaryOp('e^x',null); return; }
          if(label === "10^x") { handleUnaryOp('10^x',null); return; }
          // number & decimal
          if(/[0-9]/.test(label) || label===".") { appendToExpression(label); return; }
          // optional advanced mode specific (EXP already handled)
          if(label === "DEL2") { currentExpression = currentExpression.slice(0,-1) || "0"; updateDisplay(); }
        });
        container.appendChild(btn);
      }
    }
    // Additional STAT / MATRIX hotkeys due to mode
    let extraRow = document.createElement("div");
    extraRow.style.display = "flex";
    extraRow.style.gap = "6px";
    extraRow.style.marginTop = "8px";
    extraRow.style.gridColumn = "span 5";
    let extraBtns = [];
    if(currentMode === "STAT") extraBtns = ["mean","median","stdDev"];
    else if(currentMode === "MATRIX") extraBtns = ["det","inv"];
    else if(currentMode === "EQUATION") extraBtns = ["solveLin","solveQuad"];
    else if(currentMode === "VECTOR") extraBtns = ["dot","cross"];
    for(let cmd of extraBtns){
      let b = document.createElement("button");
      b.innerText = cmd;
      b.classList.add("func-key");
      b.style.flex = "1";
      b.onclick = () => {
        if(cmd === "mean") statCommand("mean");
        if(cmd === "median") statCommand("median");
        if(cmd === "stdDev") statCommand("std");
        if(cmd === "det") matrixOp("det");
        if(cmd === "inv") matrixOp("inv");
        if(cmd === "solveLin") solveLinear();
        if(cmd === "solveQuad") { lastResult = "Quadratic: use ax^2+bx+c=0"; updateDisplay(); }
        if(cmd === "dot") { let v2 = prompt("Vector2 [a,b,c]:"); try{ let res = math.dot(math.evaluate(currentExpression), math.evaluate(v2)); lastResult=res.toString(); currentExpression=lastResult; updateDisplay(); }catch(e){ lastResult="Err"; updateDisplay(); } }
        if(cmd === "cross") { let v2 = prompt("Vector2:"); try{ let res = math.cross(math.evaluate(currentExpression), math.evaluate(v2)); lastResult=math.format(res); currentExpression=lastResult; updateDisplay(); }catch(e){ lastResult="Err"; } }
      };
      extraRow.appendChild(b);
    }
    if(extraBtns.length) container.appendChild(extraRow);
  }

  // Mode change listener re-render extra buttons & graph handling
  function refreshUI() { renderButtons(); if(currentMode === "CALCULUS") showGraphOption(); else hideGraph(); updateDisplay(); }
  
  // memory & alpha shortcuts via keypad hidden? use status: M+ M- MR, but we include via long press? add simple memory keys in extra
  window.memoryStore = memoryStore; window.memoryRecall = memoryRecall;
  // ALPHA assignment via shortcut: press ALPHA then A/B/C/X/Y (we can capture)
  document.addEventListener("keydown", (e)=>{
    if(alphaPressed && /^[A-Z]$/i.test(e.key)) { let key = e.key.toUpperCase(); if(variables.hasOwnProperty(key)) alphaRecall(key); else alphaStore(key); alphaPressed=false; updateDisplay(); e.preventDefault(); }
    if(e.key === "Enter") calculate();
  });
  
  // dynamic init
  function init() {
    renderButtons();
    updateDisplay();
  }
  init();
  // listen mode change for re-render
  const origOpenMode = openModeMenu;
  window.openModeMenu = openModeMenu;
  setInterval(()=>{ if(document.querySelector(".modal-menu") === null) refreshUI(); }, 200);
  // extra graph command: when calculus mode detect expression change
  let oldExpr = "";
  setInterval(()=>{
    if(currentMode === "CALCULUS" && oldExpr !== currentExpression && document.getElementById("graphContainer").classList.contains("show")){
      oldExpr = currentExpression;
      showGraphOption();
    }
  }, 500);
</script>
</body>
</html>
